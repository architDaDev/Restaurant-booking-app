name: Keep Backend & Database Alive

# Runs every 10 minutes so Render's free-tier web service never sits idle long
# enough to spin down, and MongoDB Atlas keeps seeing regular connection activity.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health-check route
        run: |
          curl -sf --max-time 30 "${{ secrets.BACKEND_URL }}/" || echo "Ping failed (backend may be cold-starting) — will retry next run"
