name: MERN Restaurant App CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit-and-build:
    name: Code Verification & Compilations
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code from GitHub Repository
        uses: actions/checkout@v4

      - name: 2. Initialize Node.js Environment Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. Install Monorepo Dependencies across Workspaces
        run: npm install

      - name: 4. Audit Dependencies for Security Vulnerabilities
        run: npm audit --audit-level=high || true 
        

      - name: 5. Compile Client Frontend Production Assets
        run: npm run build --workspace=frontend-client

      - name: 6. Compile Partner Dashboard Production Assets
        run: npm run build --workspace=frontend-partner

  deploy-trigger:
    name: Production Deployment Hook
    needs: audit-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Production Webhook Deployment
        run: |
          echo "🚀 Pipeline Validated! All builds compiled cleanly."
          echo "Ready to trigger deployment pipelines on platforms like Render, Vercel, or AWS."